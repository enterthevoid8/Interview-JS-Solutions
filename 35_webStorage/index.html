<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Storage Demo</title>
    <script src="app.js" defer></script>
</head>
<body>
    <h1>Web Storage API Demo</h1>

    <h2>Local Storage</h2>
    <button id="saveLocal">Save Data to localStorage</button>
    <button id="getLocal">Get Data from localStorage</button>
    <button id="removeLocal">Remove Username</button>
    <button id="clearLocal">Clear localStorage</button>
    <p id="output">Stored Data: None</p>

    <h2>Session Storage</h2>
    <button id="saveSession">Save Data to sessionStorage</button>
    <button id="getSession">Get Data from sessionStorage</button>
    <button id="clearSession">Clear sessionStorage</button>
    <p id="sessionOutput">Stored Data: None</p>
</body>
</html>
